name: CI

on:
  push:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ai-spend-audit
        run: npm ci

      - name: Lint
        working-directory: ai-spend-audit
        run: npm run lint

      - name: Test
        working-directory: ai-spend-audit
        run: npm test -- --runInBand
